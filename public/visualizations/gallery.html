<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CayleyPy Visualizations - graphs and paths</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>:root {
  --bg: #0a0b10;
  --panel: #12141c;
  --line: #2a3145;
  --txt: #eceff7;
  --muted: #8b93a8;
  --accent: #5eead4;
  --hot: #fb7185;
  --warn: #fcd34d;
  --card: #161922;
}
* { box-sizing: border-box; }
html, body { margin: 0; }
body.app {
  font-family: "DM Sans", system-ui, sans-serif;
  background: radial-gradient(ellipse 80% 60% at 20% 0%, #1a2038 0%, var(--bg) 50%),
    radial-gradient(ellipse 60% 50% at 100% 100%, #1e1030 0%, transparent 45%), var(--bg);
  color: var(--txt);
  min-height: 100vh;
  position: relative;
}
@media (min-width: 900px) {
  html, body.app { height: 100%; overflow: hidden; }
  body.app { display: block; }
}
@media (max-width: 899px) {
  body.app { overflow: auto; }
}
.stage {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(200px, 280px) 1fr minmax(260px, 340px);
  grid-template-areas: "sidebar main rail";
  gap: 12px;
  padding: 12px 16px 12px;
  box-sizing: border-box;
}
@media (min-width: 900px) {
  .stage {
    height: 100dvh;
    max-height: 100dvh;
  }
}
@media (max-width: 899px) {
  .stage {
    grid-template-columns: 1fr;
    grid-template-areas:
      "sidebar"
      "main"
      "rail";
  }
}
.graph-sidebar {
  grid-area: sidebar;
  display: flex;
  flex-direction: column;
  min-height: 0;
  max-height: calc(100dvh - 64px);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
}
@media (max-width: 899px) {
  .graph-sidebar {
    max-height: min(42vh, 320px);
  }
}
.graph-sidebar-head {
  flex-shrink: 0;
  padding: 10px 12px 8px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--muted);
  border-bottom: 1px solid var(--line);
  background: rgba(0, 0, 0, 0.2);
}
.graph-list {
  list-style: none;
  margin: 0;
  padding: 8px;
  flex: 1;
  min-height: 0;
  overflow: auto;
  scrollbar-gutter: stable;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
.graph-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  width: 100%;
  text-align: left;
  padding: 9px 10px;
  margin-bottom: 4px;
  border: 1px solid transparent;
  border-radius: 10px;
  background: transparent;
  color: var(--txt);
  font-family: inherit;
  font-size: 0.82rem;
  line-height: 1.35;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.graph-item:last-child { margin-bottom: 0; }
.graph-item:hover {
  background: rgba(94, 234, 212, 0.06);
  border-color: rgba(94, 234, 212, 0.15);
}
.graph-item.is-active {
  background: rgba(94, 234, 212, 0.1);
  border-color: rgba(94, 234, 212, 0.45);
  box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.12);
}
.graph-item .gi-emoji {
  flex-shrink: 0;
  font-size: 1.15rem;
  line-height: 1.2;
}
.graph-item .gi-title {
  flex: 1;
  min-width: 0;
  word-break: break-word;
}
.graph-sidebar-foot {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 8px;
  border-top: 1px solid var(--line);
  background: rgba(0, 0, 0, 0.2);
}
.graph-nav-btn {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--txt);
  height: 36px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
}
.graph-nav-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.maincol {
  grid-area: main;
  display: flex;
  flex-direction: column;
  min-height: 0;
  flex: 1;
  gap: 6px;
}
.analogy {
  flex-shrink: 0;
  padding: 8px 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(94, 234, 212, 0.08), rgba(251, 113, 133, 0.06));
  border: 1px solid rgba(94, 234, 212, 0.2);
  font-size: 0.84rem;
  line-height: 1.4;
}
.analogy .emoji { font-size: 1.4rem; margin-right: 8px; vertical-align: middle; }
.analogy .hook { color: var(--txt); }
.analogy .sub { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }
#p5host {
  flex: 1 1 auto;
  min-height: 0;
  min-width: 0;
  border-radius: 16px;
  background: linear-gradient(180deg, #0d0f16, #08090d);
  border: 1px solid var(--line);
  overflow: hidden;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.5);
}
@media (min-width: 900px) {
  #p5host {
    min-height: 200px;
    max-height: min(62vh, calc(100dvh - 320px));
    flex: 1 1 auto;
  }
}
#p5host canvas { display: block; margin: 0 auto; max-width: 100%; }
.playback {
  flex-shrink: 0;
  position: relative;
  z-index: 4;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 8px 0 4px;
  min-height: 52px;
}
.playback button.play {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: rgba(94, 234, 212, 0.12);
  color: var(--accent);
  cursor: pointer;
  font-size: 1.1rem;
}
.playback input[type="range"] {
  flex: 1;
  min-width: 120px;
  accent-color: var(--accent);
}
.playback .stepcap {
  font-family: ui-monospace, monospace;
  font-size: 0.8rem;
  color: var(--muted);
}

.solver-status {
  margin: 8px 0 0;
  padding: 8px 12px;
  font-size: 0.8rem;
  line-height: 1.35;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: rgba(15, 17, 24, 0.85);
  color: var(--txt);
}
.solver-status--search {
  border-color: rgba(94, 234, 212, 0.45);
  background: rgba(94, 234, 212, 0.08);
  color: #b8f5eb;
}
.solver-status--ok {
  border-color: rgba(74, 222, 128, 0.4);
  background: rgba(74, 222, 128, 0.08);
  color: #bbf7d0;
}
.solver-status--fail {
  border-color: rgba(251, 113, 133, 0.45);
  background: rgba(251, 113, 133, 0.1);
  color: #fecdd3;
}



aside.rail {
  grid-area: rail;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  overflow: auto;
  scrollbar-gutter: stable;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
@media (min-width: 900px) {
  aside.rail { max-height: calc(100dvh - 64px); }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 0.82rem;
}
.panel h3 {
  margin: 0 0 8px;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 700;
}
.panel-sub {
  margin: 0 0 10px;
  font-size: 0.72rem;
  line-height: 1.4;
  color: var(--muted);
}
.gens-ol {
  margin: 0;
  padding-left: 1.1rem;
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--txt);
}
.gens-ol li {
  margin-bottom: 4px;
  padding-left: 4px;
}
.gens-ol-id {
  font-family: ui-monospace, monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-right: 6px;
}
.gens-ol-name {
  font-family: ui-monospace, monospace;
  color: var(--accent);
}
.bfs-3d-host {
  display: none;
  width: 100%;
  max-width: 680px;
  min-height: 120px;
  margin: 10px auto 0;
  border-radius: 14px;
  overflow: hidden;
  background:
    radial-gradient(circle at 30% 20%, rgba(94, 234, 212, 0.08), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.08), transparent 40%),
    #0d0f16;
  border: 1px solid rgba(94, 234, 212, 0.12);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
}

.bfs-3d-host.is-visible {
  display: block;
} 

.gens-ol-hint {
  display: block;
  margin-top: 2px;
  font-size: 0.68rem;
  color: var(--muted);
  line-height: 1.35;
}
.variant-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.variant-row select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--txt);
  font-size: 0.85rem;
}
.cmp {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
  line-height: 1.35;
}
.cmp th, .cmp td {
  border: 1px solid var(--line);
  padding: 5px 7px;
  text-align: left;
  vertical-align: top;
}
.cmp th { color: var(--muted); }
.cmp tbody tr:nth-child(even) { background: rgba(0, 0, 0, 0.18); }
.cmp td:first-child {
  max-width: 11em;
  word-break: break-word;
  font-weight: 500;
  color: var(--txt);
}
.edgepill {
  display: inline-flex;
  align-items: center;
  min-height: 32px;
  margin-top: 0;
  padding: 0 11px;
  border-radius: 999px;
  background: rgba(252, 211, 77, 0.12);
  border: 1px solid rgba(252, 211, 77, 0.35);
  color: var(--warn);
  font-family: ui-monospace, monospace;
  font-size: 0.78rem;
  white-space: nowrap;
}
.prepare {
  font-family: ui-monospace, monospace;
  font-size: 0.65rem;
  color: #a5b4fc;
  word-break: break-all;
  max-height: 72px;
  overflow: auto;
}
.prepare-links {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 16px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}
.prepare-links a {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.82rem;
  text-decoration: none;
  border-bottom: 1px solid rgba(94, 234, 212, 0.35);
  transition: color 0.15s, border-color 0.15s;
}
.prepare-links a:hover {
  color: #9ffcec;
  border-bottom-color: rgba(94, 234, 212, 0.75);
}
.gens-ol--compact {
  padding-left: 0;
  list-style: none;
}
.gens-ol--compact li {
  margin-bottom: 4px;
}
.gen-hit-btn {
  width: 100%;
  text-align: left;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--txt);
  font-family: inherit;
  font-size: 0.82rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.2s;
}
.gen-hit-btn:hover {
  border-color: rgba(94, 234, 212, 0.45);
  background: rgba(94, 234, 212, 0.08);
  box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.12);
}
.gen-hit-btn:active {
  transform: scale(0.99);
}
.errbox {
  color: var(--hot);
  border: 1px solid rgba(251, 113, 133, 0.4);
  padding: 8px;
  border-radius: 8px;
  font-size: 0.8rem;
}
.api-banner {
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 0.78rem;
  background: rgba(251, 113, 133, 0.12);
  border: 1px solid rgba(251, 113, 133, 0.35);
  color: #fecdd3;
}
.api-banner.api-banner--soft {
  background: rgba(94, 234, 212, 0.06);
  border-color: rgba(94, 234, 212, 0.2);
  color: var(--muted);
}
.api-banner.is-hidden { display: none; }
.main-error {
  margin: 0 0 10px;
}
#nRowLabel[hidden],
#kRowLabel[hidden] {
  display: none !important;
}
.tb-baked {
  margin: 0 0 8px;
  padding: 8px 10px;
  font-size: 0.72rem;
  line-height: 1.45;
  color: var(--muted);
  background: rgba(94, 234, 212, 0.05);
  border: 1px solid rgba(94, 234, 212, 0.12);
  border-radius: 10px;
}
.toolbar {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.22);
  border: 1px solid var(--line);
}
.tb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  align-items: stretch;
}
.tb-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tb-card-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  color: var(--muted);
  margin: 0 0 2px;
}
.tb-field {
  font-size: 0.76rem;
  color: var(--muted);
}
.tb-select {
  width: 100%;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--txt);
  font-family: inherit;
  font-size: 0.85rem;
}
.tb-btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tb-label {
  font-size: 0.78rem;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.tb-label input[type="range"] {
  width: min(120px, 28vw);
  accent-color: var(--accent);
}
.tb-val {
  font-family: ui-monospace, monospace;
  color: var(--txt);
  min-width: 4.5em;
}
.tb-btn {
  padding: 7px 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--txt);
  font-size: 0.78rem;
  cursor: pointer;
  font-family: inherit;
}
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.tb-hint {
  margin: 0;
  padding: 6px 2px 0;
  font-size: 0.72rem;
  line-height: 1.4;
  color: var(--muted);
  max-width: 52em;
}
.tb-gens {
  gap: 6px;
}
.gen-act {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid rgba(94, 234, 212, 0.25);
  background: rgba(94, 234, 212, 0.06);
  color: var(--accent);
  font-family: ui-monospace, monospace;
  font-size: 0.72rem;
  cursor: pointer;
}
.gen-act:hover {
  background: rgba(94, 234, 212, 0.14);
  border-color: var(--accent);
}
.gen-act:disabled { opacity: 0.4; cursor: not-allowed; }

.beam-viz {
  flex-shrink: 0;
  min-height: 0;
  max-height: min(200px, 28vh);
  overflow: auto;
  padding: 8px 10px 10px;
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(30, 16, 48, 0.5), rgba(10, 11, 16, 0.9));
  border: 1px solid rgba(94, 234, 212, 0.15);
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
.beam-viz-head {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 6px;
}
.beam-chart svg {
  display: block;
  width: 100%;
  height: 72px;
}
.beam-bfs-bar {
  animation: bfsBarPulse 2.8s ease-in-out infinite;
}
@keyframes bfsBarPulse {
  0%, 100% { fill: rgba(94, 234, 212, 0.55); }
  40% { fill: rgba(94, 234, 212, 0.95); filter: drop-shadow(0 0 6px rgba(94, 234, 212, 0.55)); }
}
.beam-pt {
  animation: beamPtPulse 2.4s ease-in-out infinite;
}
@keyframes beamPtPulse {
  0%, 100% { opacity: 0.45; }
  35% { opacity: 1; filter: drop-shadow(0 0 5px rgba(251, 113, 133, 0.9)); }
}
.beam-path-anim {
  stroke-dasharray: 8 4;
  animation: beamPathFlow 1.2s linear infinite;
}
@keyframes beamPathFlow {
  to { stroke-dashoffset: -24; }
}
.beam-empty {
  font-size: 0.75rem;
  color: var(--muted);
  padding: 8px 0 4px;
}
.beam-legend {
  font-size: 0.68rem;
  line-height: 1.45;
  color: var(--muted);
  margin-top: 8px;
  padding-bottom: 2px;
}
.modal[hidden] { display: none !important; }
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
}
.modal-panel {
  position: relative;
  z-index: 1;
  max-width: min(520px, 100%);
  max-height: min(80vh, 640px);
  overflow: auto;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px 18px 20px;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
}
.modal-title {
  font-family: "Instrument Serif", Georgia, serif;
  font-weight: 400;
  font-size: 1.35rem;
  margin: 0 0 12px;
}
.modal-x {
  position: absolute;
  top: 10px;
  right: 12px;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
}
.modal-x:hover { color: var(--txt); }
.modal-body { font-size: 0.84rem; line-height: 1.45; }
.modal-gen-row {
  display: grid;
  grid-template-columns: auto auto 1fr;
  gap: 8px 10px;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.modal-gen-row:last-child { border-bottom: none; }
.modal-gen-idx {
  font-family: ui-monospace, monospace;
  font-size: 0.72rem;
  color: var(--muted);
}
.modal-gen-name {
  font-family: ui-monospace, monospace;
  color: var(--accent);
  font-size: 0.8rem;
}
.modal-gen-hint {
  font-size: 0.78rem;
  color: var(--txt);
}


/* CayleyPy website theme overrides. Keep the visualization engine intact. */
:root {
  --bg: #efe1cf;
  --panel: rgba(255, 251, 246, 0.82);
  --line: rgba(23, 20, 17, 0.2);
  --txt: #171411;
  --muted: #413930;
  --accent: #171411;
  --hot: #a43f4f;
  --warn: #7a4b00;
  --card: #fffdf9;
  --surface-strong: #fffdf9;
  --shadow-soft: 0 20px 48px rgba(23, 20, 17, 0.08);
  --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
}

html,
body.app {
  min-height: 100%;
  height: auto;
  overflow: auto;
}

body.app {
  font-family: var(--sans);
  background: radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 32%), var(--bg);
  color: var(--txt);
}

.viz-header {
  max-width: 1260px;
  margin: 0 auto;
  padding: 24px 24px 18px;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 18px;
  border-bottom: 1px solid var(--line);
}

.viz-header__brand {
  color: var(--txt);
  text-decoration: none;
  font-family: var(--serif);
  font-size: 1.45rem;
  letter-spacing: -0.04em;
}

.viz-header__copy {
  display: grid;
  gap: 6px;
}

.viz-header__title {
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(2.1rem, 4vw, 3.8rem);
  font-weight: 500;
  letter-spacing: -0.04em;
  line-height: 0.98;
}

.viz-header__summary {
  margin: 0;
  max-width: 52rem;
  color: var(--muted);
  line-height: 1.55;
}

.viz-header__links {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
}

.viz-header__links a {
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.36);
  text-decoration: none;
}

.viz-header__links a:hover,
.viz-header__links a:focus-visible {
  color: var(--txt);
  border-color: rgba(23, 20, 17, 0.38);
  background: rgba(255, 255, 255, 0.56);
}

.stage {
  max-width: 1260px;
  margin: 0 auto;
  padding: 18px 24px 36px;
}

@media (min-width: 900px) {
  .stage {
    min-height: calc(100dvh - 170px);
    height: calc(100dvh - 170px);
    max-height: none;
  }
}

.graph-sidebar,
.rail,
.toolbar,
.tb-card,
#p5host,
.analogy,
.beam-viz,
.modal-panel {
  box-shadow: var(--shadow-soft);
}

.graph-sidebar,
.rail,
.toolbar,
.tb-card,
.modal-panel {
  background: var(--panel);
  backdrop-filter: blur(14px);
}

.graph-sidebar,
.rail,
#p5host,
.toolbar,
.tb-card,
.graph-item,
.tb-btn,
.graph-nav-btn,
.gen-hit-btn,
.variant-row select,
.tb-select,
.modal-panel,
.cmp th,
.cmp td {
  border-color: var(--line);
}

.graph-sidebar-head,
.graph-sidebar-foot {
  background: rgba(255, 255, 255, 0.36);
}

.graph-item:hover,
.graph-item.is-active,
.tb-btn:hover,
.gen-hit-btn:hover,
.gen-act,
.analogy {
  background: rgba(23, 20, 17, 0.05);
  border-color: rgba(23, 20, 17, 0.28);
  color: var(--txt);
  box-shadow: none;
}

#p5host {
  background: linear-gradient(180deg, rgba(255, 253, 249, 0.92), rgba(247, 241, 233, 0.86));
  box-shadow: inset 0 0 80px rgba(23, 20, 17, 0.06), var(--shadow-soft);
}

.edgepill,
.prepare,
.prepare-links a,
.gen-act,
.modal-gen-name {
  color: var(--txt);
}

.edgepill {
  background: rgba(122, 75, 0, 0.08);
  border-color: rgba(122, 75, 0, 0.25);
}

.api-banner,
.errbox {
  color: var(--hot);
  background: rgba(164, 63, 79, 0.08);
  border-color: rgba(164, 63, 79, 0.24);
}

.cmp tbody tr:nth-child(even),
.feed-like-row:nth-child(even) {
  background: rgba(23, 20, 17, 0.04);
}

.modal-backdrop {
  background: rgba(23, 20, 17, 0.45);
}

button,
input,
select {
  accent-color: var(--accent);
}

@media (max-width: 899px) {
  .viz-header {
    align-items: start;
    flex-direction: column;
    padding-inline: 18px;
  }

  .viz-header__links {
    justify-content: flex-start;
  }

  .stage {
    padding-inline: 18px;
  }
}

</style>
</head>
<body class="app">
  <header class="viz-header">
    <div class="viz-header__copy">
      <a class="viz-header__brand" href="../">CayleyPy</a>
      <h1 class="viz-header__title">Visualizations</h1>
      <p class="viz-header__summary">Interactive Cayley graph and puzzle views generated for browser-side exploration. Choose a graph, inspect its generators, and play paths or random walks without a server.</p>
    </div>
    <nav class="viz-header__links" aria-label="Visualization links">
      <a href="../">Main site</a>
      <a href="https://qdiag.xyz/cube/" target="_blank" rel="noreferrer">Cube solver demo</a>
    </nav>
  </header>

  <div class="stage">
    <aside class="graph-sidebar" aria-label="Graph catalog">
      <div class="graph-sidebar-head">Graphs</div>
      <ul id="graphList" class="graph-list"></ul>
      <div class="graph-sidebar-foot">
        <button type="button" id="btnPrev" class="graph-nav-btn" aria-label="Previous graph">←</button>
        <button type="button" id="btnNext" class="graph-nav-btn" aria-label="Next graph">→</button>
      </div>
    </aside>

    <div class="maincol">
      <div class="analogy" id="analogyBox"></div>

      <div class="toolbar" id="toolbar">
        <p id="bakedParams" class="tb-baked" hidden></p>
        <div class="tb-grid">
          <div class="tb-card tb-card--demo">
            <div class="tb-card-title">Demo and steps</div>
            <p id="mainError" class="main-error api-banner" hidden role="alert"></p>

            <label class="tb-label" id="nRowLabel" hidden>
              n
              <input type="range" id="nSlider" min="2" max="12" step="1" value="6" />
              <span id="nLabel" class="tb-val"></span>
            </label>

            <label class="tb-label" id="kRowLabel" hidden>
              k
              <input type="range" id="kSlider" min="2" max="12" step="1" value="2" />
              <span id="kLabel" class="tb-val">k=2</span>
            </label>

            <label class="tb-label">
              animation speed
              <input type="range" id="speedSlider" min="0" max="120" value="28" />
              <span id="speedLabel" class="tb-val"></span>
            </label>

            <label class="tb-label" id="rwRowLabel">
              RW length
              <input type="range" id="rwLen" min="1" max="120" step="1" value="14" />
              <span id="rwLenLabel" class="tb-val">14</span>
            </label>

            <div class="tb-btn-row">
              <button type="button" class="tb-btn" id="btnGensDemo" title="Apply generators one by one to the current view">
                Run generators
              </button>
              <button type="button" class="tb-btn" id="btnRandomWalk" title="Random moves from the current displayed state">
                Random walk
              </button>
              <button type="button" class="tb-btn" id="btnResetState" title="Return the display to the graph start state">
                Reset state
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="p5host"></div>

      <div class="playback">
        <button type="button" class="play" id="btnPlay" title="Show the path to the center">▶</button>
        <input type="range" id="stepSlider" min="0" max="0" value="0" />
        <span class="stepcap" id="stepCap">step 0 / 0</span>
        <span class="edgepill" id="edgePill">To center</span>
      </div>
      <div id="solverStatus" class="solver-status" hidden role="status" aria-live="polite"></div>

      <div id="beamViz" class="beam-viz" hidden aria-label="Beam (hidden)"></div>
      <div id="bfs3dHost" class="bfs-3d-host" aria-hidden="true"></div>
    </div>

    <aside class="rail" id="rail"></aside>
  </div>

  function solutionSteps() {
    var g = activeGraph();
    if (!g) return [];
  
    var displayed = getDisplayedState();
    if (!displayed || !displayed.length) return [];
  
    var center = flattenStateVec(g.central_state);
    if (!center.length) return [];
  
    var dispKey = stateKeyLocal(displayed);
    var centerKey = stateKeyLocal(center);
  
    if (dispKey === centerKey) {
      return [{ state: displayed.slice(), edge: null }];
    }
  
    if (
      g._play_solution_cache &&
      g._play_solution_cache.key === dispKey &&
      Array.isArray(g._play_solution_cache.steps)
    ) {
      return g._play_solution_cache.steps;
    }
  
    var stepsFromVariant = (function () {
      var v = currentVariant();
      if (!v || !v.steps || !v.steps.length) return null;
  
      for (var i = 0; i < v.steps.length; i++) {
        var st = v.steps[i] && v.steps[i].state ? flattenStateVec(v.steps[i].state) : [];
        if (stateKeyLocal(st) === dispKey) {
          var tail = [];
          for (var j = i; j < v.steps.length; j++) {
            tail.push({
              state: flattenStateVec(v.steps[j].state),
              edge: j === i ? null : v.steps[j].edge
            });
          }
          return tail;
        }
      }
      return null;
    })();
  
    var gens = g.generator_permutations || [];
    var names = g.generator_names || [];
  
    if (g.id === "rubik_222") {
      // ok
    } else if (g.id === "rubik_333") {
      // ok
    }
  
    if (!gens.length || !window.CayleyClient || !CayleyClient.buildFourVariants) {
      if (stepsFromVariant && stepsFromVariant.length) {
        g._play_solution_cache = {
          key: dispKey,
          steps: stepsFromVariant,
        };
        return stepsFromVariant;
      }
  
      showError("This graph cannot recompute a path from an arbitrary state directly in the browser.");
      return null;
    }
  
    try {
      var variants = CayleyClient.buildFourVariants(
        displayed.slice(),
        center.slice(),
        gens,
        names,
        { graphId: g.id || "" }
      );
  
      var best = variants && variants.length ? variants[0] : null;
      var steps =
        best && best.steps && best.steps.length
          ? best.steps
          : [{ state: displayed.slice(), edge: null }];
  
      if (!best || !best.steps || !best.steps.length || best.error) {
        if (stepsFromVariant && stepsFromVariant.length) {
          g._play_solution_cache = {
            key: dispKey,
            steps: stepsFromVariant,
          };
          return stepsFromVariant;
        }
  
        showError(
          best && best.error
            ? best.error
            : "Beam search did not find a solution for the current state."
        );
        return null;
      }
  
      g._play_solution_cache = {
        key: dispKey,
        steps: steps,
      };
  
      return steps;
    } catch (err) {
      if (stepsFromVariant && stepsFromVariant.length) {
        g._play_solution_cache = {
          key: dispKey,
          steps: stepsFromVariant,
        };
        return stepsFromVariant;
      }
  
      showError("Error while searching for a solution: " + (err && err.message ? err.message : String(err)));
      return null;
    }
  }

  /** Как solutionSteps, но beam/greedy/bidirectional не блокируют главный поток. */
  async function solutionStepsAsync() {
    var g = activeGraph();
    if (!g) return [];

    var displayed = getDisplayedState();
    if (!displayed || !displayed.length) return [];

    var center = flattenStateVec(g.central_state);
    if (!center.length) return [];

    var dispKey = stateKeyLocal(displayed);
    var centerKey = stateKeyLocal(center);

    if (dispKey === centerKey) {
      return [{ state: displayed.slice(), edge: null }];
    }

    if (
      g._play_solution_cache &&
      g._play_solution_cache.key === dispKey &&
      Array.isArray(g._play_solution_cache.steps)
    ) {
      return g._play_solution_cache.steps;
    }

    var stepsFromVariant = (function () {
      var v = currentVariant();
      if (!v || !v.steps || !v.steps.length) return null;

      for (var i = 0; i < v.steps.length; i++) {
        var st = v.steps[i] && v.steps[i].state ? flattenStateVec(v.steps[i].state) : [];
        if (stateKeyLocal(st) === dispKey) {
          var tail = [];
          for (var j = i; j < v.steps.length; j++) {
            tail.push({
              state: flattenStateVec(v.steps[j].state),
              edge: j === i ? null : v.steps[j].edge
            });
          }
          return tail;
        }
      }
      return null;
    })();

    var gens = g.generator_permutations || [];
    var names = g.generator_names || [];

    if (!gens.length || !window.CayleyClient || !CayleyClient.buildFourVariantsAsync) {
      if (stepsFromVariant && stepsFromVariant.length) {
        g._play_solution_cache = {
          key: dispKey,
          steps: stepsFromVariant,
        };
        return stepsFromVariant;
      }

      showError("This graph cannot recompute a path from an arbitrary state directly in the browser.");
      return null;
    }

    try {
      var variants = await CayleyClient.buildFourVariantsAsync(
        displayed.slice(),
        center.slice(),
        gens,
        names,
        { graphId: g.id || "" }
      );

      var best = variants && variants.length ? variants[0] : null;
      var steps =
        best && best.steps && best.steps.length
          ? best.steps
          : [{ state: displayed.slice(), edge: null }];

      if (!best || !best.steps || !best.steps.length || best.error) {
        if (stepsFromVariant && stepsFromVariant.length) {
          g._play_solution_cache = {
            key: dispKey,
            steps: stepsFromVariant,
          };
          return stepsFromVariant;
        }

        showError(
          best && best.error
            ? best.error
            : "Beam search did not find a solution for the current state."
        );
        return null;
      }

      g._play_solution_cache = {
        key: dispKey,
        steps: steps,
      };

      return steps;
    } catch (err) {
      if (stepsFromVariant && stepsFromVariant.length) {
        g._play_solution_cache = {
          key: dispKey,
          steps: stepsFromVariant,
        };
        return stepsFromVariant;
      }

      showError("Error while searching for a solution: " + (err && err.message ? err.message : String(err)));
      return null;
    }
  }

  var bfsThree = { scene: null, camera: null, renderer: null, mesh: null };
  function updateBfsThree(layers) {
    var el = $("bfs3dHost");
    if (!el) return;
    if (!layers || !layers.length) {
      el.innerHTML = "";
      el.classList.remove("is-visible");
      return;
    }
    if (typeof THREE === "undefined") return;
    el.classList.add("is-visible");
    var maxL = Math.max.apply(null, layers);
    if (maxL <= 0) maxL = 1;
    var W = Math.min(el.clientWidth || 520, 640);
    var H = 100;
    if (!bfsThree.renderer) {
      bfsThree.scene = new THREE.Scene();
      bfsThree.camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
      bfsThree.camera.position.set(0, 2.2, 7);
      bfsThree.camera.lookAt(0, 0.5, 0);
      bfsThree.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      bfsThree.renderer.setSize(W, H);
      bfsThree.renderer.setClearColor(0x000000, 0);
      el.innerHTML = "";
      el.appendChild(bfsThree.renderer.domElement);
      var light = new THREE.DirectionalLight(0xffffff, 0.9);
      light.position.set(2, 4, 5);
      bfsThree.scene.add(light);
      bfsThree.scene.add(new THREE.AmbientLight(0x404060, 0.6));
    } else {
      bfsThree.renderer.setSize(W, H);
      while (bfsThree.scene.children.length > 2) {
        bfsThree.scene.remove(bfsThree.scene.children[bfsThree.scene.children.length - 1]);
      }
    }
    var n = layers.length;
    var span = Math.max(n * 0.42, 2);
    for (var i = 0; i < n; i++) {
      var h = 0.15 + (layers[i] / maxL) * 1.2;
      var geom = new THREE.BoxGeometry(0.32, h, 0.32);
      var mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(0.48 + i * 0.02, 0.6, 0.55),
        metalness: 0.2,
        roughness: 0.45,
      });
      var mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(-span / 2 + (i / Math.max(n - 1, 1)) * span, h / 2, 0);
      bfsThree.scene.add(mesh);
    }
    bfsThree.renderer.render(bfsThree.scene, bfsThree.camera);
  }

        return flattenStateVec(steps[idx - 1].state);
      }
    }
    if (steps[idx] && steps[idx].state !== undefined) {
      return flattenStateVec(steps[idx].state);
    }
    return flattenStateVec(g.start_state);
  }

  /* --- p5 drawing --- */
  /** Interpolate angle along the shortest arc. */
  function lerpAngleShortest(a0, a1, t) {
    var d = a1 - a0;
    d -= Math.PI * 2 * Math.floor((d + Math.PI) / (Math.PI * 2));
    return a0 + d * t;
  }

  /** Hungarian rings: L / R / -L / -R — какой круг вращается. */
  function parseHungarianRingEdge(edgeLabel) {
    var s = String(edgeLabel || "")
      .replace(/^generator:\s*/i, "")
      .trim();
    if (s.indexOf("-L") >= 0) return "L";
    if (s.indexOf("-R") >= 0) return "R";
    if (s === "L") return "L";
    if (s === "R") return "R";
    return null;
  }

  function drawHungarianRingsTheme(p, s0, s1, t, edgeLabel, g) {
    s0 = flattenStateVec(s0);
    s1 = flattenStateVec(s1);
    var hr = g.hr_layout;
    if (!hr || !window.CayleyClient) {
      drawRing(p, s0, s1, t, "two_rings", g);
      return;
    }
  
    var lay = CayleyClient.layoutHungarianRings(
      hr.left_size,
      hr.left_index,
      hr.right_size,
      hr.right_index,
      hr.full_size,
      p.width,
      p.height
    );
  
    var pos = lay.positions;
    var cxL = p.width * 0.34;
    var cxR = p.width * 0.66;
    var cy = p.height * 0.52;
    var R = Math.min(p.width, p.height) * 0.3;
    var ringTurn = parseHungarianRingEdge(edgeLabel);
  
    p.stroke(55);
    p.noFill();
    p.strokeWeight(2);
    p.circle(cxL, cy, R * 2);
    p.circle(cxR, cy, R * 2);
    if (ringTurn === "L") {
      p.stroke(94, 234, 212, 120 + 80 * t);
      p.circle(cxL, cy, R * 2 + 6);
    } else if (ringTurn === "R") {
      p.stroke(94, 234, 212, 120 + 80 * t);
      p.circle(cxR, cy, R * 2 + 6);
    }
  
    var n = hr.full_size;
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      if (i0 < 0 || i1 < 0) continue;

      var p0 = pos[i0] || { x: p.width * 0.5, y: p.height * 0.5 };
      var p1 = pos[i1] || { x: p.width * 0.5, y: p.height * 0.5 };
  
      var x;
      var y;
      if (i0 === i1) {
        x = p0.x;
        y = p0.y;
      } else {
        var cxU = cxL;
        var cyU = cy;
        if (ringTurn === "R") {
          cxU = cxR;
        } else if (ringTurn === "L") {
          cxU = cxL;
        } else {
          var dLa = Math.hypot(p0.x - cxL, p0.y - cy) + Math.hypot(p1.x - cxL, p1.y - cy);
          var dRa = Math.hypot(p0.x - cxR, p0.y - cy) + Math.hypot(p1.x - cxR, p1.y - cy);
          cxU = dLa <= dRa ? cxL : cxR;
        }
        var r0 = Math.hypot(p0.x - cxU, p0.y - cyU);
        var r1 = Math.hypot(p1.x - cxU, p1.y - cyU);
        var rr = r0 + (r1 - r0) * t;
        var ang0 = Math.atan2(p0.y - cyU, p0.x - cxU);
        var ang1 = Math.atan2(p1.y - cyU, p1.x - cxU);
        var ang = lerpAngleShortest(ang0, ang1, t);
        x = cxU + rr * Math.cos(ang);
        y = cyU + rr * Math.sin(ang);
      }
  
      var rad = 15;
      p.fill(p.color(PAL[v % PAL.length]));
      p.stroke(18, 22, 32);
      p.strokeWeight(2);
      p.circle(x, y, rad * 2);
      p.noStroke();
      p.fill(23, 20, 17);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(12);
      p.text(String(v + 1), x, y);
    }
  
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 6);
  }

  function deltaSlotShortest(i0, i1, n) {
    var d = i1 - i0;
    d = ((d % n) + n) % n;
    if (d > n / 2) d -= n;
    return d;
  }

  function lrxTrackX(i0, i1, n, pad, cw, t) {
    if (i0 < 0 || i1 < 0) return pad;
    var x0 = pad + i0 * cw;
    var c1 = pad + i1 * cw;
    var c2 = pad + (i1 - n) * cw;
    var c3 = pad + (i1 + n) * cw;
    var best = c1;
    if (Math.abs(c2 - x0) < Math.abs(best - x0)) best = c2;
    if (Math.abs(c3 - x0) < Math.abs(best - x0)) best = c3;
    return x0 + (best - x0) * t;
  }

  /** LRX: horizontal track; L shifts left, R shifts right, X swaps ends. */
  function drawLrxBand(p, s0, s1, t, edgeLabel) {
    s0 = flattenStateVec(s0);
    s1 = flattenStateVec(s1);
    var n = s0.length;
    if (n < 2) return;
    var pad = 32;
    var cw = (p.width - 2 * pad) / Math.max(n - 1, 1);
    var y0 = p.height * 0.42;
    var el = String(edgeLabel || "")
      .replace(/^generator:\s*/i, "")
      .trim();
    p.stroke(48, 55, 72);
    p.strokeWeight(3);
    p.line(pad - 8, y0, p.width - pad + 8, y0);
    p.noStroke();
    for (var slot = 0; slot < n; slot++) {
      var sx = pad + slot * cw;
      p.fill(40, 46, 58);
      p.textSize(9);
      p.textAlign(p.CENTER, p.TOP);
      p.text(String(slot), sx, y0 + 22);
    }
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text("<- L · R -> · X - ends · slots 0..." + (n - 1), p.width / 2, 8);
    var isX = el === "X" || el.indexOf("X") === 0;
    var beads = [];
    var v;
    for (v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      if (i0 < 0 || i1 < 0) continue;
      var x = lrxTrackX(i0, i1, n, pad, cw, t);
      var y = y0 + (v - (n - 1) / 2) * 2.8;
      if (isX && i0 !== i1 && (i0 === 0 || i0 === n - 1 || i1 === 0 || i1 === n - 1)) {
        y += Math.sin(t * Math.PI) * 22;
      } else if (!isX && i0 !== i1) {
        var dir = deltaSlotShortest(i0, i1, n);
        y += Math.sin(t * Math.PI) * 4 * (dir < 0 ? -1 : dir > 0 ? 1 : 0);
      }
      beads.push({ v: v, x: x, y: y });
    }
    beads.sort(function (a, b) {
      return a.x - b.x || a.v - b.v;
    });
    for (v = 0; v < beads.length; v++) {
      var b = beads[v];
      p.fill(p.color(PAL[b.v % PAL.length]));
      p.stroke(14, 18, 28);
      p.strokeWeight(2);
      p.circle(b.x, b.y, 34);
      p.noStroke();
      p.fill(23, 20, 17);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(14);
      p.text(String(b.v + 1), b.x, b.y);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  function drawBlocksTheme(p, s0, s1, t, edgeLabel) {
    var n = s0.length;
    var pad = 20;
    var gap = 6;
    var bw = (p.width - 2 * pad - gap * (n - 1)) / Math.max(n, 1);
    var bh = Math.min(48, p.height * 0.35);
    var baseY = p.height * 0.58;
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text("position blocks - fragment swaps", p.width / 2, 8);
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      var x0 = pad + i0 * (bw + gap);
      var x1 = pad + i1 * (bw + gap);
      var x = x0 + (x1 - x0) * t;
      var y = baseY + Math.sin((v + 1) * 0.4) * 4 * (1 - t);
      p.fill(p.color(PAL[v % PAL.length]));
      p.stroke(45);
      p.strokeWeight(2);
      p.rect(x, y, bw, bh, 10);
      p.noStroke();
      p.fill(16);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(16);
      p.text(String(v + 1), x + bw / 2, y + bh / 2);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  function drawDnaTheme(p, s0, s1, t, edgeLabel) {
    var n = s0.length;
    var pad = 24;
    var cw = (p.width - 2 * pad) / Math.max(n - 1, 1);
    var yA = p.height * 0.36;
    var yB = p.height * 0.64;
    var helix = 14;
    p.stroke(60, 80, 100);
    p.strokeWeight(1);
    for (var ii = 0; ii < n - 1; ii++) {
      var xa = pad + ii * cw;
      p.line(xa, yA + Math.sin(ii * 0.9) * helix, xa + cw, yA + Math.sin((ii + 1) * 0.9) * helix);
      p.line(xa, yB - Math.sin(ii * 0.9) * helix, xa + cw, yB - Math.sin((ii + 1) * 0.9) * helix);
    }
    p.noStroke();
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text("two strands · links - local cycles", p.width / 2, 8);
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      var xf = i0 + (i1 - i0) * t;
      var x = pad + xf * cw;
      var row = v % 2;
      var yBase = row === 0 ? yA : yB;
      var ph = Math.sin(xf * 0.75) * helix * (row === 0 ? 1 : -1);
      var y = yBase + ph;
      p.fill(p.color(PAL[v % PAL.length]));
      p.circle(x, y, 30);
      p.fill(20);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(13);
      p.text(String(v + 1), x, y);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  function drawPermTheme(p, theme, s0, s1, t, edgeLabel) {
    s0 = flattenStateVec(s0);
    s1 = flattenStateVec(s1);
    var ag = activeGraph();
    if (ag && ag.id === "hungarian_rings" && ag.hr_layout) {
      drawHungarianRingsTheme(p, s0, s1, t, edgeLabel, ag);
      return;
    }
    if (theme === "pancake") {
      drawPancakeStack(p, s0, s1, t, false, edgeLabel, ag);
      return;
    }
    if (theme === "tiles_adjacent") {
      drawCoxeterAdjacentLane(p, s0, s1, t, edgeLabel);
      return;
    }
    if (theme === "lrx_band") {
      drawLrxBand(p, s0, s1, t, edgeLabel);
      return;
    }
    if (theme === "blocks") {
      drawBlocksTheme(p, s0, s1, t, edgeLabel);
      return;
    }
    if (theme === "dna") {
      drawDnaTheme(p, s0, s1, t, edgeLabel);
      return;
    }
    if (theme === "ring" || theme === "orbit" || theme === "two_rings") {
      drawRing(p, s0, s1, t, theme, ag);
      return;
    }
    if (theme === "deck") {
      drawDeckFan(p, s0, s1, t, edgeLabel);
      return;
    }
    if (theme === "dice") {
      drawTokensLerp(p, s0, s1, t, edgeLabel, { caption: "same generator set for the same seed", gentle: true });
      return;
    }
    drawTokensLerp(p, s0, s1, t, edgeLabel, null);
  }

  /** Card fan for conjugacy classes. */
  function drawDeckFan(p, s0, s1, t, edgeLabel) {
    var n = s0.length;
    var cx = p.width * 0.5;
    var cy = p.height * 0.72;
    var R = Math.min(p.width, p.height) * 0.39;
    var aMin = -Math.PI * 0.82;
    var aMax = -Math.PI * 0.18;
    var span = Math.max(n - 1, 1);
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text("one cycle type - fan of positions", p.width / 2, 8);
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      var ang0 = aMin + ((aMax - aMin) * i0) / span;
      var ang1 = aMin + ((aMax - aMin) * i1) / span;
      var ang = lerpAngleShortest(ang0, ang1, t);
      var x = cx + R * Math.cos(ang);
      var y = cy + R * Math.sin(ang);
      p.fill(p.color(PAL[v % PAL.length]));
      p.stroke(35);
      p.strokeWeight(1);
      p.rectMode(p.CENTER);
      p.push();
      p.translate(x, y);
      p.rotate(ang + Math.PI / 2);
      p.rect(0, 0, 26, 36, 4);
      p.pop();
      p.noStroke();
      p.fill(20);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(12);
      p.text(String(v + 1), x, y);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  function drawTokensLerp(p, s0, s1, t, edgeLabel, opts) {
    opts = opts || {};
    var n = s0.length;
    var pad = 24;
    var cw = (p.width - 2 * pad) / Math.max(n - 1, 1);
    if (opts.caption) {
      p.fill(65, 57, 48);
      p.textSize(10);
      p.textAlign(p.CENTER, p.TOP);
      p.text(opts.caption, p.width / 2, 8);
    }
    p.noStroke();
    var wig = opts.gentle ? 2.5 : 6;
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      var x = p.lerp(pad + i0 * cw, pad + i1 * cw, t);
      var y = p.height / 2 + Math.sin((v + 1) * 0.7 + t * 2) * wig * (1 - t);
      p.fill(p.color(PAL[v % PAL.length]));
      p.circle(x, y, 34);
      p.fill(20);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(14);
      p.text(String(v + 1), x, y);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  /** Coxeter: adjacent transpositions only, drawn as tiles in a row. */
  function drawCoxeterAdjacentLane(p, s0, s1, t, edgeLabel) {
    var n = s0.length;
    var pad = 28;
    var cw = (p.width - 2 * pad) / Math.max(n - 1, 1);
    var y0 = p.height * 0.5;
    p.stroke(55, 62, 80);
    p.strokeWeight(2);
    p.line(pad - 6, y0 + 22, p.width - pad + 6, y0 + 22);
    p.noStroke();
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text("adjacent positions · one step is transposition (i i+1)", p.width / 2, 8);
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      var x0 = pad + i0 * cw;
      var x1 = pad + i1 * cw;
      var x = x0 + (x1 - x0) * t;
      var y = y0;
      if (i0 !== i1) {
        y += Math.sin(t * Math.PI) * -28;
      }
      var w = Math.min(cw * 0.72, 40);
      p.fill(p.color(PAL[v % PAL.length]));
      p.stroke(45);
      p.strokeWeight(1.5);
      p.rectMode(p.CENTER);
      p.rect(x, y, w, w * 1.05, 8);
      p.noStroke();
      p.fill(18);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(14);
      p.text(String(v + 1), x, y);
    }
    p.fill(65, 57, 48);
    p.textSize(11);
    p.textAlign(p.LEFT, p.BOTTOM);
    p.text(edgeLabel || "", 8, p.height - 8);
  }

  function drawPancakeStack(p, s0, s1, t, squareTiles, edgeLabel, graphRec) {
    s0 = flattenStateVec(s0);
    s1 = flattenStateVec(s1);
    graphRec = graphRec || activeGraph() || {};
    var graphId = graphRec.id || "";
    var n = s0.length;
    var ph = Math.min(30, (p.height - 108) / Math.max(n, 1));
    var maxW = p.width * 0.62;
    var baseY = p.height - 32;
    var cx = p.width / 2;
    p.textAlign(p.CENTER, p.TOP);
    p.fill(65, 57, 48);
    p.textSize(11);
    p.text(
      "Centered stack: position index 0 is at the base, " + (n - 1) + " is the top. Wider rectangle means larger pancake number.",
      p.width / 2,
      6
    );
    p.fill(65, 57, 48);
    p.textSize(10);
    if (graphId === "full_reversals") {
      p.text(
        "Generator R[i..j] reverses one contiguous segment of positions i...j, inclusive. Prefix reversal is the i = 0 case.",
        p.width / 2,
        24
      );
    } else {
      p.text(
        "Generator Rk (pancake) flips positions 0...k at the base; the top of the stack has the larger position index. Pancake width is its value.",
        p.width / 2,
        24
      );
    }
    p.stroke(72, 80, 100);
    p.strokeWeight(2);
    p.line(cx - maxW * 0.48, baseY + 6, cx + maxW * 0.48, baseY + 6);
    p.noStroke();
    var layers = [];
    var v;
    for (v = 0; v < n; v++) {
      var pos0 = indexOfVal(s0, v);
      var pos1 = indexOfVal(s1, v);
      if (pos0 < 0 || pos1 < 0) continue;
      var pos = p.lerp(pos0, pos1, t);
      var y = baseY - (pos + 0.5) * ph;
      var w = p.map(v + 1, 1, n, maxW * 0.26, maxW);
      layers.push({ v: v, y: y, w: w });
    }
    layers.sort(function (a, b) {
      return b.y - a.y;
    });
    for (v = 0; v < layers.length; v++) {
      var L = layers[v];
      p.push();
      p.translate(cx, L.y);
      p.fill(p.color(PAL[L.v % PAL.length]));
      p.stroke(48);
      p.strokeWeight(2);
      p.rectMode(p.CENTER);
      if (squareTiles) p.rect(0, 0, L.w, ph - 3, 8);
      else p.rect(0, 0, L.w, ph - 5, 12);
      p.noStroke();
      p.fill(18);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(n > 12 ? 12 : 15);
      p.text(String(L.v + 1), 0, 0);
      p.pop();
    }
    p.fill(65, 57, 48);
    p.textSize(10);
    p.textAlign(p.CENTER, p.TOP);
    p.text(edgeLabel ? String(edgeLabel) : "", p.width / 2, baseY + 14);
  }

  function drawRing(p, s0, s1, t, theme, graphRec) {
    var n = s0.length;
    var cx = p.width / 2;
    var cy = p.height / 2 + 10;
    var R = Math.min(p.width, p.height) * 0.36;
    var oval = graphRec && graphRec.id === "top_spin";
    var rx = oval ? R * 1.08 : R;
    var ry = oval ? R * 0.72 : R;
    p.stroke(50);
    p.noFill();
    p.strokeWeight(2);
    if (oval) {
      p.ellipse(cx, cy, rx * 2, ry * 2);
    } else {
      p.circle(cx, cy, R * 2);
      if (theme === "orbit") {
        p.stroke(94, 234, 212, 35);
        p.strokeWeight(1);
        p.noFill();
        p.circle(cx, cy, R * 2 + 14);
      }
    }
    if (theme === "two_rings") p.circle(cx - R * 0.55, cy, R * 1.45);
    for (var v = 0; v < n; v++) {
      var i0 = indexOfVal(s0, v);
      var i1 = indexOfVal(s1, v);
      if (i0 < 0 || i1 < 0) continue;
      var a0 = -p.HALF_PI + (i0 / n) * p.TWO_PI;
      var a1 = -p.HALF_PI + (i1 / n) * p.TWO_PI;
      var a = lerpAngleShortest(a0, a1, t);
      var ox = theme === "two_rings" && v >= n / 2 ? R * 0.35 : 0;
      var x = cx + ox + rx * Math.cos(a);
      var y = cy + ry * Math.sin(a);
      p.fill(p.color(PAL[v % PAL.length]));
      p.noStroke();
      p.circle(x, y, 30);
      p.fill(15);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(13);
      p.text(String(v + 1), x, y);
    }
  }

  function coerceMatrixRows(mat) {
    if (Array.isArray(mat[0])) {
      return mat;
    }
    var flat = mat;
    var n = flat.length;
    var s = Math.round(Math.sqrt(n));
    if (s * s !== n) {
      return [flat];
    }
    var out = [];
    for (var i = 0; i < s; i++) {
      out.push(flat.slice(i * s, i * s + s));
    }
    return out;
  }

  function drawMatrixPanel(p, flat, ox, oy, cell) {
    var rows = flat.length;
    var cols = flat[0].length;
    p.textAlign(p.CENTER, p.CENTER);
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var v = flat[r][c];
        var g0 = 30 + ((v * 17) % 200);
        p.fill(g0, g0 + 20, 50);
        p.stroke(70);
        p.rect(ox + c * cell, oy + r * cell, cell - 2, cell - 2, 6);
        p.fill(23, 20, 17);
        p.textSize(cell * 0.28);
        p.text(String(v), ox + c * cell + cell / 2, oy + r * cell + cell / 2);
      }
    }
  }

  function drawMatrixPanelMorph(p, f0, f1, ox, oy, cell, t, ctx) {
    var rows = f0.length;
    var cols = f0[0].length;
    p.textAlign(p.CENTER, p.CENTER);
    var pulse = 0.5 + 0.5 * Math.sin((ctx && ctx.frameCount ? ctx.frameCount : 0) * 0.12);
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var v0 = f0[r][c];
        var v1 = f1[r][c];
        var changed = v0 !== v1;
        var v =
          typeof v0 === "number" && typeof v1 === "number"
            ? v0 + (v1 - v0) * t
            : t < 1
              ? v0
              : v1;
        if (changed) {
          p.stroke(251, 191, 36, 90 + pulse * 100);
          p.strokeWeight(2);
        } else {
          p.noStroke();
        }
        var g0 = 30 + ((Math.round(v) * 17) % 200);
        p.fill(g0, g0 + 20, 50);
        p.rect(ox + c * cell, oy + r * cell, cell - 2, cell - 2, 6);
        p.fill(23, 20, 17);
        p.noStroke();
        p.textSize(cell * 0.28);
        p.text(String(Math.round(v)), ox + c * cell + cell / 2, oy + r * cell + cell / 2);
      }
    }
  }

  function drawMatrixTheme(p, mat0, mat1, t, ctx) {
    var pulse = 0.5 + 0.5 * Math.sin(ctx.frameCount * 0.08);
    var f0 = coerceMatrixRows(mat0);
    var f1 = coerceMatrixRows(mat1);
    var rows = f0.length;
    var cols = f0[0].length;
    var gap = 12;
    var labelH = 18;
    var halfH = (p.height - labelH * 2 - gap) / 2;
    var cell = Math.min((p.width - 24) / cols, halfH / Math.max(rows, 1), 44);
    var ox = (p.width - cols * cell) / 2;
    p.fill(65, 57, 48);
    p.noStroke();
    p.textAlign(p.LEFT, p.TOP);
    p.textSize(11);
    p.text("from", 8, 2);
    p.textAlign(p.RIGHT, p.TOP);
    p.text("to (morph)", p.width - 8, 2);
    drawMatrixPanel(p, f0, ox, labelH + 4, cell);
    var oy2 = labelH + 8 + rows * cell + gap;
    drawMatrixPanelMorph(p, f0, f1, ox, oy2, cell, t, ctx);
    p.fill(220, 200, 120, 140 + pulse * 40);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(16);
    p.text("→", p.width / 2, labelH + 4 + rows * cell + gap * 0.35);
  }

  function canvasDims(host) {
    var w = Math.max(host.clientWidth || 400, 200);
    var ch = host.clientHeight;
    if (!ch || ch < 48) {
      ch = Math.floor(window.innerHeight * 0.58);
    }
    var h = Math.max(160, ch - 4);
    if (h > 1400) h = 1400;
    return { w: w, h: h };
  }

  var p5Ref = null;

  function resizeP5Canvas() {
    var host = $("p5host");
    if (!p5Ref || !host) return;
    var d = canvasDims(host);
    p5Ref.resizeCanvas(d.w, d.h);
  }

  function resizeViz() {
    var host = $("p5host");
    if (!host) return;
    if (window.Puzzle3d && Puzzle3d.isActive && Puzzle3d.isActive()) {
      Puzzle3d.resize(host);
    } else {
      resizeP5Canvas();
    }
  }

  function blendStickerVec(a, b, tEase) {
    var n = Math.max(a.length, b.length);
    var o = [];
    for (var i = 0; i < n; i++) {
      var va = a[i] != null ? Number(a[i]) : 0;
      var vb = b[i] != null ? Number(b[i]) : va;
      o.push(Math.round(va + (vb - va) * tEase));
    }
    return o;
  }

  function clipTriangle(p, x1, y1, x2, y2, x3, y3) {
    var ctx = p.drawingContext;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.closePath();
    ctx.clip();
  }

  /** Four tetrahedron faces as a net: central triangle plus three around it. */
  function drawPyraminxTheme(p, raw0, raw1, tEase, ctx) {
    var v0 = flattenStateVec(raw0);
    var v1 = flattenStateVec(raw1);
    var blended = blendStickerVec(v0, v1, tEase);
    p.background(255, 253, 249);
    var pulse = 0.5 + 0.5 * Math.sin(ctx.frameCount * 0.1);
    var w = p.width;
    var h = p.height;
    var cx = w * 0.5;
    var cy = h * 0.52;
    var R = Math.min(w, h) * 0.2;
    var sqrt3 = Math.sqrt(3);
    p.fill(65, 57, 48);
    p.noStroke();
    p.textAlign(p.CENTER, p.TOP);
    p.textSize(11);
    p.text("Pyraminx · tetrahedron net", w / 2, 6);
    var faces = [
      { ox: 0, oy: R * 0.55, label: "0" },
      { ox: -R * sqrt3 * 0.55, oy: -R * 0.28, label: "1" },
      { ox: R * sqrt3 * 0.55, oy: -R * 0.28, label: "2" },
      { ox: 0, oy: -R * 1.15, label: "3" },
    ];
    var f;
    for (f = 0; f < 4; f++) {
      var fx = cx + faces[f].ox;
      var fy = cy + faces[f].oy;
      var x1 = fx;
      var y1 = fy - R;
      var x2 = fx - (R * sqrt3) / 2;
      var y2 = fy + R * 0.5;
      var x3 = fx + (R * sqrt3) / 2;
      var y3 = y2;
      var slice = blended.slice(f * 9, (f + 1) * 9);
      if (slice.length < 9) {
        while (slice.length < 9) slice.push(0);
      }
      p.push();
      clipTriangle(p, x1, y1, x2, y2, x3, y3);
      var minX = Math.min(x1, x2, x3);
      var minY = Math.min(y1, y2, y3);
      var maxX = Math.max(x1, x2, x3);
      var maxY = Math.max(y1, y2, y3);
      drawFaceStickerGrid(p, slice, minX, minY, maxX - minX, maxY - minY, pulse);
      p.pop();
      p.stroke(180, 170, 158);
      p.strokeWeight(2);
      p.noFill();
      p.triangle(x1, y1, x2, y2, x3, y3);
    }
  }

  function drawFaceStickerGrid(p, slice, ox, oy, maxW, maxH, pulse) {
    var len = slice.length;
    if (!len) return;
    var cols = Math.ceil(Math.sqrt(len));
    var rows = Math.ceil(len / cols);
    var cell = Math.min(maxW / cols, maxH / rows, 28);
    p.textAlign(p.CENTER, p.CENTER);
    for (var i = 0; i < len; i++) {
      var r = Math.floor(i / cols);
      var c = i % cols;
      var v = slice[i];
      p.fill(36 + (v * 11) % 100, 48 + pulse * 20, 62 + (v * 7) % 40);
      p.stroke(196, 187, 174);
      p.strokeWeight(1);
      p.rect(ox + c * cell, oy + r * cell, cell - 1.5, cell - 1.5, 5);
      p.fill(23, 20, 17);
      p.noStroke();
      p.textSize(Math.max(8, cell * 0.36));
      p.text(String(v), ox + c * cell + cell / 2, oy + r * cell + cell / 2);
    }
  }

  function drawVectorGridBlock(p, vec, ox, oy, maxW, maxH, cols) {
    var rows = Math.ceil(vec.length / cols);
    var cell = Math.min(maxW / cols, maxH / Math.max(rows, 1), 22);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(Math.max(9, cell * 0.42));
    for (var i = 0; i < vec.length; i++) {
      var r = Math.floor(i / cols);
      var c = i % cols;
      p.fill(40 + (vec[i] * 9) % 120, 50, 80);
      p.stroke(196, 187, 174);
      p.rect(ox + c * cell, oy + r * cell, cell - 1, cell - 1, 3);
      p.fill(23, 20, 17);
      p.text(String(vec[i]), ox + c * cell + cell / 2, oy + r * cell + cell / 2);
    }
    return cell;
  }

  function drawVectorGridBlockTween(p, vec0, vec1, ox, oy, maxW, maxH, cols, t, ctx) {
    var n = Math.max(vec0.length, vec1.length);
    var rows = Math.ceil(n / cols);
    var cell = Math.min(maxW / cols, maxH / Math.max(rows, 1), 22);
    var pulse = 0.5 + 0.5 * Math.sin((ctx && ctx.frameCount ? ctx.frameCount : 0) * 0.1);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(Math.max(9, cell * 0.42));
    for (var i = 0; i < n; i++) {
      var va = vec0[i];
      var vb = vec1[i];
      var ch = va !== vb;
      var v =
        typeof va === "number" && typeof vb === "number"
          ? va + (vb - va) * t
          : t < 0.5
            ? va
            : vb;
      var r = Math.floor(i / cols);
      var c = i % cols;
      if (ch) {
        p.stroke(94, 234, 212, 70 + pulse * 100);
        p.strokeWeight(2);
      } else {
        p.noStroke();
      }
      p.fill(40 + (Math.round(v) * 9) % 120, 50, 80);
      p.rect(ox + c * cell, oy + r * cell, cell - 1, cell - 1, 3);
      p.fill(23, 20, 17);
      p.text(String(Math.round(v)), ox + c * cell + cell / 2, oy + r * cell + cell / 2);
    }
  }

  function drawVectorTheme(p, vec0, vec1, t, ctx) {
    var pulse = 0.5 + 0.5 * Math.sin(ctx.frameCount * 0.07);
    var cols = 8;
    var mid = 14;
    var half = (p.width - mid) / 2;
    var top = 22;
    p.fill(65, 57, 48);
    p.noStroke();
    p.textAlign(p.LEFT, p.TOP);
    p.textSize(11);
    p.text("from", 8, 4);
    p.textAlign(p.RIGHT, p.TOP);
    p.text("to (morph)", p.width - 8, 4);
    drawVectorGridBlock(p, vec0, 6, top, half - 10, p.height - top - 8, cols);
    drawVectorGridBlockTween(p, vec0, vec1, half + mid + 4, top, half - 10, p.height - top - 8, cols, t, ctx);
    p.fill(220, 200, 120, 160 + pulse * 50);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(20);
    p.text("→", p.width / 2, top + (p.height - top) * 0.48);
  }

  function startSketch() {
    var host = $("p5host");
    if (!host) return;
    host.innerHTML = "";
    var g = activeGraph();
    if (g && graphNeedsPuzzle3d(g) && window.Puzzle3d && typeof THREE !== "undefined") {
      Puzzle3d.mount(host, {
        graphId: g.id,
        getState: getRubikTweenState,
      });
      if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(function () {
        Puzzle3d.resize(host);
      }).observe(host);
      }
      requestAnimationFrame(function () {
        resizeViz();
      });
      return;
    }
    new p5(function (p) {
      p5Ref = p;
      p.setup = function () {
        var d = canvasDims(host);
        p.createCanvas(d.w, d.h);
        p.frameRate(30);
      };
      p.windowResized = function () {
        resizeP5Canvas();
      };
      p.draw = function () {
        var g2 = activeGraph();
        var steps = currentSteps();
        if (!g2 || !steps.length) {
          p.background(255, 253, 249);
          p.fill(65, 57, 48);
          p.noStroke();
          p.textAlign(p.CENTER, p.CENTER);
          p.text("no steps to display", p.width / 2, p.height / 2);
          return;
        }
        if (animStartMs > 0) {
          animT = Math.min(1, (Date.now() - animStartMs) / ANIM_MS);
          if (animT >= 1) {
            animT = 1;
            animStartMs = 0;
          }
        }
        var theme = (g2.visual && g2.visual.theme) || "bars";
        var k = g2.kind || "permutation";
        p.background(255, 253, 249);
        var tweenT = generatorDemoInstant ? 1 : ease(animT);
        if (k === "permutation") {
          var s0 = flattenStateVec(stepIdx > 0 ? steps[stepIdx - 1].state : steps[0].state);
          var s1 = flattenStateVec(steps[stepIdx].state);
          drawPermTheme(p, theme, s0, s1, tweenT, stepIdx > 0 ? steps[stepIdx].edge : null);
        } else if (k === "matrix") {
          var sm0 = stepIdx > 0 ? steps[stepIdx - 1].state : steps[0].state;
          var sm1 = steps[stepIdx].state;
          drawMatrixTheme(p, sm0, sm1, tweenT, p);
        } else if (k === "vector" && g2.id === "pyraminx") {
          var sp0 = stepIdx > 0 ? steps[stepIdx - 1].state : steps[0].state;
          var sp1 = steps[stepIdx].state;
          drawPyraminxTheme(p, sp0, sp1, tweenT, p);
        } else {
          var sv0 = stepIdx > 0 ? steps[stepIdx - 1].state : steps[0].state;
          var sv1 = steps[stepIdx].state;
          drawVectorTheme(p, sv0, sv1, tweenT, p);
        }
      };
    }, host);
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(function () {
        resizeViz();
      }).observe(host);
    }
    requestAnimationFrame(resizeViz);
  }

  function kickDeferredVectorRemat() {
    if (!deferredVectorRematGraphs.length || !window.CayleyClient || !CayleyClient.rematerializeVectorPuzzleAsync)
      return;
    var pending = deferredVectorRematGraphs.slice();
    deferredVectorRematGraphs.length = 0;
    setSolverStatus("Restoring path to the target...", "search");
    Promise.all(
      pending.map(function (gg) {
        return CayleyClient.rematerializeVectorPuzzleAsync(gg);
      })
    )
      .then(function () {
        setSolverStatus("", "idle");
        var ag = activeGraph();
        if (ag && pending.indexOf(ag) >= 0) {
          syncStepUi();
          renderRail();
          renderMethodToolbar();
          syncToolbar();
          renderBeamChart();
          requestAnimationFrame(resizeViz);
        }
      })
      .catch(function (err) {
        var em = err && err.message ? err.message : String(err);
        setSolverStatus("Error: " + em, "fail");
        showError("Error while restoring the path: " + em);
      });
  }

  showGraph();
  kickDeferredVectorRemat();
})();
</script>
